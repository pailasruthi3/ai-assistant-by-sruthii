<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 90%;
      max-width: 800px;
      height: 90vh;
      background: #1e293b;
      border-radius: 15px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 15px;
      background: #111827;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="header">My AI Chatbot</div>

    <iframe 
      src="https://www.stackai.com/chat/6a16c01bfe52989fbb564120-1DDuveQj25A50hxedVARE1">
    </iframe>
  </div>
</body>
</html>
